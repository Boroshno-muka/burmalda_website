<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> kot </title>
    <style>
        body {
            margin: 0;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spinning-img {
            max-width: 80%;
            max-height: 60vh;
            animation: spin 4s linear infinite;
            cursor: pointer;
            border-radius: 10px;
        }
        .instruction {
            margin-top: 20px;
            font-size: 18px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <img src="photo_2025-06-22_20-41-47.jpg" class="spinning-img" id="meme-img">

    <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <div class="instruction"> </div>

    <script>
        const img = document.getElementById('meme-img');
        const music = document.getElementById('bg-music');
        img.addEventListener('click', () => {
            if (music.paused) { music.play(); } else { music.pause(); }
        });
    </script>

</body>
</html>
